# Render.com Blueprint – Book Insight API
# https://render.com/docs/blueprint-spec
# Connect your GitHub repo; Render will use this for one-click deploy.
# For PostgreSQL, create a database in the dashboard and set DATABASE_URL in the service env.

services:
  - type: web
    name: book-insight-api
    runtime: python
    region: frankfurt

    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: ENV
        value: prod
      - key: JWT_SECRET_KEY
        generateValue: true
      # Set DATABASE_URL in Render dashboard (e.g. PostgreSQL from Render, or leave default SQLite for demo)
